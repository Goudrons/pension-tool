name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Dependencies installieren
        run: pip install flask pyinstaller pillow pywebview
      - name: PNG zu ICO konvertieren
        run: python -c "from PIL import Image; img = Image.open('favicon.png'); img.save('favicon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"
      - name: EXE bauen
        run: pyinstaller --onefile --windowed --icon=favicon.ico --name="Schweizer-Pension-Tool" app_desktop4.py
      - name: Inno Setup installieren
        run: choco install innosetup -y
      - name: Installer bauen
        run: |
          echo '[Setup]' > setup.iss
          echo 'AppName=Schweizer Pension Tool' >> setup.iss
          echo 'AppVersion=4.0' >> setup.iss
          echo 'DefaultDirName={autopf}\Schweizer Pension Tool' >> setup.iss
          echo 'DefaultGroupName=Schweizer Pension Tool' >> setup.iss
          echo 'DisableDirPage=no' >> setup.iss
          echo 'OutputBaseFilename=Schweizer-Pension-Tool-Setup' >> setup.iss
          echo 'OutputDir=.' >> setup.iss
          echo '[Files]' >> setup.iss
          echo 'Source: "dist\Schweizer-Pension-Tool.exe"; DestDir: "{app}"' >> setup.iss
          echo '[Icons]' >> setup.iss
          echo 'Name: "{group}\Schweizer Pension Tool"; Filename: "{app}\Schweizer-Pension-Tool.exe"' >> setup.iss
          echo 'Name: "{commondesktop}\Schweizer Pension Tool"; Filename: "{app}\Schweizer-Pension-Tool.exe"' >> setup.iss
          iscc setup.iss
      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Schweizer-Pension-Tool-Setup
          path: Schweizer-Pension-Tool-Setup.exe
